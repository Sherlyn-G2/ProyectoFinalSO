<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Registro</title>
        <link rel="stylesheet" href="css/style.css">

        </head>
        <body>
            <div class="register-box">
        <h2> Registrarse </h2>
        <form id="registerForm" >

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre">
        <br>
        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido">
        <br>
        <label for="correo">Correo electróico</label>
        <input type="email" id="registerEmail" name="correo" placeholder="nombre@gmail.com" required>
        <br>
        <label for="constraseña">Constraseña</label>
        <input type="password" id="registerPassword" name="contraseña" placeholder="****" required>
        <button type="submit">Siguiente</button>
       </form>
        <a href="index.html">Ya tengo cuenta</a>
    </div>
    <script src="js/Validacion.js"></script>
    
   
        
    </body>
</html>
